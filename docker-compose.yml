version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: healthpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthpilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-healthpilot}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthpilot} -d ${POSTGRES_DB:-healthpilot}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthpilot-network

  # ============================================
  # Redis Cache & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: healthpilot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-healthpilot_redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-healthpilot_redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthpilot-network

  # ============================================
  # HealthPilot Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: healthpilot-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-healthpilot}:${POSTGRES_PASSWORD:-healthpilot_secret}@postgres:5432/${POSTGRES_DB:-healthpilot}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-healthpilot_redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32-character-encryption-key!}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-4096}
      OPENAI_TIMEOUT: ${OPENAI_TIMEOUT:-60000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./scripts:/app/scripts
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    command: sh ./scripts/docker-dev-start.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${PORT:-3000}/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - healthpilot-network

  # ============================================
  # Redis Commander (Development Only)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: healthpilot-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-healthpilot_redis_secret}
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - dev
    networks:
      - healthpilot-network

  # ============================================
  # pgAdmin (Development Only)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: healthpilot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@healthpilot.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - healthpilot-network

# ============================================
# Networks
# ============================================
networks:
  healthpilot-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
